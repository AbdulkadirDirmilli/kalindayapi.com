# Kalinda Yapı - Nginx Yapılandırması
# Bu dosyayı sunucuda /etc/nginx/sites-available/kalindayapi.com olarak kaydedin
# Ardından: sudo ln -s /etc/nginx/sites-available/kalindayapi.com /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Yeniden başlat: sudo systemctl reload nginx

# HTTP → HTTPS yönlendirmesi (tüm HTTP trafiğini HTTPS'e yönlendir)
server {
    listen 80;
    listen [::]:80;
    server_name kalindayapi.com www.kalindayapi.com;

    # Tüm HTTP isteklerini HTTPS + www'ye yönlendir
    return 301 https://www.kalindayapi.com$request_uri;
}

# HTTPS non-www → www yönlendirmesi
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kalindayapi.com;

    # SSL sertifikaları (Let's Encrypt kullanıyorsanız)
    ssl_certificate /etc/letsencrypt/live/kalindayapi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kalindayapi.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # non-www'yi www'ye yönlendir
    return 301 https://www.kalindayapi.com$request_uri;
}

# Ana site yapılandırması (www.kalindayapi.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.kalindayapi.com;

    # SSL sertifikaları
    ssl_certificate /etc/letsencrypt/live/kalindayapi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kalindayapi.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # .next klasörünü engelle (güvenlik)
    location /.next {
        deny all;
        return 404;
    }

    # Diğer hassas path'leri engelle
    location ~ /\. {
        deny all;
        return 404;
    }

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Statik dosyalar için cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @nextjs;
    }

    # Uploads klasörü (nginx tarafından sunulur)
    location /uploads/ {
        alias /var/www/kalindayapi.com/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Next.js uygulamasına proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout ayarları
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js fallback
    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
